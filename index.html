<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Organize seu dia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span>TaskFlow</span>
    </div>
    <nav class="categories">
      <button class="cat-btn active" data-filter="all">
        <span class="cat-dot all"></span> Todas
        <span class="cat-count" id="count-all">0</span>
      </button>
      <button class="cat-btn" data-filter="work">
        <span class="cat-dot work"></span> Trabalho
        <span class="cat-count" id="count-work">0</span>
      </button>
      <button class="cat-btn" data-filter="personal">
        <span class="cat-dot personal"></span> Pessoal
        <span class="cat-count" id="count-personal">0</span>
      </button>
      <button class="cat-btn" data-filter="study">
        <span class="cat-dot study"></span> Estudos
        <span class="cat-count" id="count-study">0</span>
      </button>
    </nav>
    <div class="progress-wrap">
      <p class="progress-label">Progresso de hoje</p>
      <div class="progress-bar-outer">
        <div class="progress-bar-inner" id="progress-bar"></div>
      </div>
      <p class="progress-pct" id="progress-pct">0%</p>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title" id="page-title">Todas as Tarefas</h1>
        <p class="page-sub" id="today-date"></p>
      </div>
      <button class="btn-add" id="btn-open-modal">
        <span>+</span> Nova Tarefa
      </button>
    </header>

    <section class="task-area">
      <div class="task-tabs">
        <button class="tab active" data-tab="pending">Pendentes</button>
        <button class="tab" data-tab="done">Concluídas</button>
      </div>
      <ul class="task-list" id="task-list"></ul>
      <div class="empty-state" id="empty-state">
        <span class="empty-icon">✦</span>
        <p>Nenhuma tarefa aqui.</p>
        <p class="empty-sub">Adicione uma nova tarefa para começar.</p>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 class="modal-title">Nova Tarefa</h2>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="task-title" placeholder="O que precisa ser feito?" />
      </div>
      <div class="form-group">
        <label>Descrição (opcional)</label>
        <textarea id="task-desc" placeholder="Detalhes da tarefa..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Categoria</label>
          <select id="task-category">
            <option value="work">Trabalho</option>
            <option value="personal">Pessoal</option>
            <option value="study">Estudos</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridade</label>
          <select id="task-priority">
            <option value="low">Baixa</option>
            <option value="medium">Média</option>
            <option value="high">Alta</option>
          </select>
        </div>
      </div>
      <button class="btn-save" id="btn-save">Salvar Tarefa</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
